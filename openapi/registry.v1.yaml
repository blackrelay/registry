          description: Semantic killmail page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KillmailListEnvelope"
  /v1/killmails/{id}:
    get:
      summary: Get a Semantic Killmail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Semantic killmail record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KillmailEnvelope"
              examples:
                npcKillmail:
                  $ref: "#/components/examples/NPCKillmail"
                playerKillmail:
                  $ref: "#/components/examples/PlayerKillmail"
                unresolvedKillmail:
                  $ref: "#/components/examples/UnresolvedKillmail"
        "404":
          $ref: "#/components/responses/Error"
  /v1/killmails/{id}/raw:
    get:
      summary: Get Raw Killmail Data
      parameters:
        - name: id
          in: path
          required: true
          schema:
