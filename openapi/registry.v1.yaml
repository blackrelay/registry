              schema:
                $ref: "#/components/schemas/CurrentRelationListEnvelope"
  /v1/events:
    get:
      summary: List Indexed Source Events
      parameters:
        - name: kind
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Environment"
        - $ref: "#/components/parameters/Cycles"
        - name: cycle
          in: query
          description: Legacy singular cycle filter. Prefer `cycles` for current/default scope.
          schema:
            type: integer
            minimum: 1
        - name: package_id
          in: query
          description: Sui package ID.
          schema:
            type: string
        - name: module
          in: query
          description: Move module name.
          schema:
            type: string
        - name: transaction_digest
          in: query
          description: Sui transaction digest.
          schema:
            type: string
        - name: source_id
          in: query
          description: Registry source ID.
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Event page ordered by event time.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListEnvelope"
  /v1/events/{id}:
    get:
      summary: Get an Indexed Source Event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /v1/killmails:
