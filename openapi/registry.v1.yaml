openapi: 3.1.0
info:
  title: Black Relay Registry API
  version: 0.1.0
  description: Source-aware public EVE Frontier registry API for canonical world data, semantic killmails and operations state.
servers:
  - url: http://127.0.0.1:8080
paths:
  /v1/health:
    get:
      summary: Health Check
      responses:
        "200":
          description: Registry process is serving.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
  /v1/ready:
    get:
      summary: Readiness Check
      responses:
        "200":
          description: Database-backed Registry is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyEnvelope"
        "503":
          $ref: "#/components/responses/Error"
  /v1/metrics:
    get:
      summary: Prometheus-Style Metrics
      responses:
        "200":
          description: Plain text metrics.
          content:
            text/plain:
              schema:
                type: string
  /v1/search:
    get:
      summary: Search Entities
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/EntityType"
        - $ref: "#/components/parameters/Environment"
        - $ref: "#/components/parameters/Cycles"
        - $ref: "#/components/parameters/TypeID"
        - $ref: "#/components/parameters/GroupID"
        - $ref: "#/components/parameters/CategoryID"
        - $ref: "#/components/parameters/MarketGroupID"
        - $ref: "#/components/parameters/WreckTypeID"
        - $ref: "#/components/parameters/SourceArtefactID"
        - $ref: "#/components/parameters/StaticEntityType"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Entity search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityListEnvelope"
  /v1/entities:
    get:
      summary: List Entities
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/EntityType"
        - $ref: "#/components/parameters/Environment"
        - $ref: "#/components/parameters/Cycles"
        - $ref: "#/components/parameters/TypeID"
        - $ref: "#/components/parameters/GroupID"
        - $ref: "#/components/parameters/CategoryID"
        - $ref: "#/components/parameters/MarketGroupID"
        - $ref: "#/components/parameters/WreckTypeID"
        - $ref: "#/components/parameters/SourceArtefactID"
        - $ref: "#/components/parameters/StaticEntityType"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Entity page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityListEnvelope"
  /v1/entities/{idOrSlug}:
    get:
      summary: Get an Entity
      parameters:
        - $ref: "#/components/parameters/IDOrSlug"
      responses:
        "200":
          description: Entity record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /v1/entities/{idOrSlug}/facts:
    get:
      summary: List Source-Backed Facts for an Entity
      parameters:
        - $ref: "#/components/parameters/IDOrSlug"
      responses:
        "200":
          description: Entity fact list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactListEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /v1/entities/{idOrSlug}/relations:
    get:
      summary: List Relations Connected to an Entity
      parameters:
        - $ref: "#/components/parameters/IDOrSlug"
      responses:
        "200":
          description: Entity relation list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationListEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /v1/entities/{idOrSlug}/sources:
    get:
      summary: List Sources Used by an Entity
      parameters:
        - $ref: "#/components/parameters/IDOrSlug"
      responses:
        "200":
          description: Entity source list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /v1/entities/{idOrSlug}/history:
    get:
      summary: Get Entity Facts, Relations and Sources Together
      parameters:
        - $ref: "#/components/parameters/IDOrSlug"
      responses:
        "200":
          description: Entity history record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityHistoryEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /v1/types:
    get:
      summary: List Static-Client Type Entities
      description: Returns static-client-backed item, material, ship, structure and enemy type entities with exact fact filters.
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/EntityType"
        - $ref: "#/components/parameters/Environment"
        - $ref: "#/components/parameters/Cycles"
        - $ref: "#/components/parameters/TypeID"
        - $ref: "#/components/parameters/GroupID"
        - $ref: "#/components/parameters/CategoryID"
        - $ref: "#/components/parameters/MarketGroupID"
        - $ref: "#/components/parameters/WreckTypeID"
        - $ref: "#/components/parameters/SourceArtefactID"
        - $ref: "#/components/parameters/StaticEntityType"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Static-client type entity page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityListEnvelope"
  /v1/types/{typeID}:
    get:
      summary: Get a Static-Client Type Entity by Type ID
      parameters:
        - $ref: "#/components/parameters/TypeIDPath"
        - $ref: "#/components/parameters/EntityType"
        - $ref: "#/components/parameters/Environment"
        - $ref: "#/components/parameters/Cycles"
        - $ref: "#/components/parameters/GroupID"
        - $ref: "#/components/parameters/CategoryID"
        - $ref: "#/components/parameters/MarketGroupID"
        - $ref: "#/components/parameters/WreckTypeID"
        - $ref: "#/components/parameters/SourceArtefactID"
        - $ref: "#/components/parameters/StaticEntityType"
      responses:
        "200":
          description: Static-client type entity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /v1/current/characters:
    get:
      summary: List Current Character State
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Environment"
        - $ref: "#/components/parameters/Cycles"
        - $ref: "#/components/parameters/SourceID"
        - $ref: "#/components/parameters/Tribe"
        - $ref: "#/components/parameters/ProfileState"
        - $ref: "#/components/parameters/HasActivity"
        - $ref: "#/components/parameters/HasTribe"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
