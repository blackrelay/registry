        - $ref: "#/components/parameters/System"
        - $ref: "#/components/parameters/Victim"
        - $ref: "#/components/parameters/Killer"
        - $ref: "#/components/parameters/KillerTypeID"
        - $ref: "#/components/parameters/Reporter"
        - $ref: "#/components/parameters/NPC"
        - $ref: "#/components/parameters/FromTime"
        - $ref: "#/components/parameters/ToTime"
        - $ref: "#/components/parameters/ExcludeFixtures"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
