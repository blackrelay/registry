        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAdmin:
      type: http
      scheme: bearer
      description: Local development admin bearer token configured with `BR_REGISTRY_ADMIN_TOKEN`.
    cloudflareAccess:
      type: apiKey
      in: header
      name: Cf-Access-Jwt-Assertion
      description: Cloudflare Access JWT. The Registry validates the RS256 signature, issuer and application AUD tag before allowing admin routes.
  parameters:
    Q:
      name: q
      in: query
      schema:
        type: string
    EntityType:
      name: type
      in: query
      schema:
        $ref: "#/components/schemas/EntityType"
    Environment:
      name: environment
      in: query
      description: Registry environment. Omit to query Stillness.
      schema:
        $ref: "#/components/schemas/Environment"
    Cycles:
      name: cycles
      in: query
      description: Cycle scope for list queries. Omit for the current cycle, or use `current` or `6` for strict Cycle 6 rows.
      schema:
        type: string
        examples:
          - current
          - "6"
    TypeID:
      name: type_id
      in: query
      description: Exact static-client `type_id` fact.
      schema:
        type: string
    TypeIDPath:
      name: typeID
      in: path
      required: true
      description: Exact static-client type ID.
      schema:
        type: string
    GroupID:
      name: group_id
      in: query
      description: Exact static-client `group_id` fact.
      schema:
        type: string
    CategoryID:
      name: category_id
      in: query
      description: Exact static-client `category_id` fact.
      schema:
        type: string
    MarketGroupID:
      name: market_group_id
      in: query
      description: Exact static-client `market_group_id` fact.
      schema:
        type: string
    WreckTypeID:
      name: wreck_type_id
      in: query
      description: Exact static-client `wreck_type_id` fact.
      schema:
        type: string
    SourceArtefactID:
      name: source_artefact_id
      in: query
      description: Exact source artefact ID recorded on the type facts.
      schema:
        type: string
    SourceID:
      name: source_id
      in: query
      description: Exact contributing source ID recorded on the current-state facts or relation edge.
      schema:
        type: string
    StaticEntityType:
      name: static_entity_type
      in: query
      description: Exact normalised entity type derived from static-client type metadata.
      schema:
        $ref: "#/components/schemas/EntityType"
    ProfileState:
      name: profile
      in: query
      description: Filter current records by whether they have a sourced profile or only a generated placeholder display name. Character current-state reads default to `known`.
      schema:
        type: string
        enum: [known, placeholder]
    Tribe:
      name: tribe
      in: query
      description: Filter current records by `belongs_to` tribe entity id.
      schema:
        type: string
    Owner:
      name: owner
      in: query
      description: Filter current records by `owned_by` owner entity id.
      schema:
        type: string
    OwnerCap:
      name: owner_cap
      in: query
      description: Filter current infrastructure records by evidence-only `owner_cap_id`.
      schema:
        type: string
    LocationHash:
      name: location_hash
      in: query
      description: Filter current infrastructure records by evidence-only `location_hash`.
      schema:
        type: string
    System:
      name: system
      in: query
      description: Filter records connected to this system entity id.
      schema:
        type: string
    ConnectedTo:
      name: connected_to
      in: query
      description: Filter systems, gates or routes connected to this system entity id.
      schema:
        type: string
    HasActivity:
      name: has_activity
      in: query
      description: Filter current records by whether public activity relations exist.
      schema:
        type: boolean
    HasTribe:
      name: has_tribe
      in: query
      description: Filter current records by whether a derived tribe relation exists.
      schema:
        type: boolean
    HasOwnerCap:
      name: has_owner_cap
      in: query
      description: Filter current infrastructure records by whether owner-capability evidence exists.
      schema:
        type: boolean
    HasLocationHash:
      name: has_location_hash
      in: query
      description: Filter current infrastructure records by whether location-hash evidence exists.
      schema:
        type: boolean
    HasResolvedOwner:
      name: has_resolved_owner
      in: query
      description: Filter current infrastructure records by whether owner evidence has been resolved to an `owned_by` relation.
      schema:
        type: boolean
    HasResolvedSystem:
      name: has_resolved_system
      in: query
      description: Filter current infrastructure records by whether location evidence has been resolved to a system relation.
      schema:
        type: boolean
    Victim:
      name: victim
      in: query
      description: Filter killmails by victim character entity id.
      schema:
        type: string
    Killer:
      name: killer
      in: query
      description: Filter killmails by killer character or enemy entity id.
      schema:
        type: string
    KillerTypeID:
      name: killer_type_id
      in: query
      description: Filter killmails by explicit NPC/static type id. Raw killer_id values are not treated as static NPC type ids.
      schema:
        type: string
    Reporter:
      name: reporter
      in: query
      description: Filter killmails by reporter character entity id.
      schema:
        type: string
    NPC:
      name: npc
      in: query
      description: When true, return NPC/enemy killmails with an explicit killer type id or sourced enemy killer relation; when false, return player-character killmails.
      schema:
        type: boolean
    ExcludeFixtures:
      name: exclude_fixtures
      in: query
      description: Exclude local fixture/proof killmails from list results. Raw fixture records remain available by id.
      schema:
        type: boolean
    FromTime:
      name: from
      in: query
      description: Inclusive lower bound for killmail `occurredAt`.
      schema:
        type: string
        format: date-time
    ToTime:
      name: to
      in: query
      description: Inclusive upper bound for killmail `occurredAt`.
      schema:
        type: string
        format: date-time
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
    Cursor:
      name: cursor
      in: query
      schema:
        $ref: "#/components/schemas/Cursor"
    IDOrSlug:
      name: idOrSlug
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Structured error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Meta:
      type: object
      additionalProperties: false
      required: [registry, apiVersion]
      properties:
        registry:
          type: string
          minLength: 1
          description: Registry instance identifier. Black Relay deployments use `black-relay-registry`; other operators should configure their own stable id.
          example: black-relay-registry
        apiVersion:
          type: string
          minLength: 1
          description: Public API version emitted by this instance.
          example: v1
    Cursor:
      type: string
      description: Opaque base64url keyset cursor.
    Environment:
      type: string
      enum: [stillness, utopia, unknown]
    SourceKind:
      type: string
      enum: [onchain, sui_event, sui_object, world_api, datahub, static_client_data, reverse_engineered, observed_gameplay, community_report, manual_inference]
    Confidence:
      type: string
      enum: [verified, probable, reported, stale, unknown]
    ReviewStatus:
      type: string
      enum: [candidate, reviewed, published, rejected, superseded]
    Freshness:
      type: string
      enum: [live_indexed, cached_snapshot, static_cycle_data, cycle_archive, manual_observation, unknown]
    EntityType:
      type: string
      enum: [character, player, tribe, alliance, item, material, recipe, blueprint, ship, structure, assembly, gate, storage, market, turret, system, region, constellation, site, resource_object, enemy, killmail, event, route, unknown]
    Entity:
      type: object
      additionalProperties: false
      required: [id, slug, entityType, name, environment]
      properties:
        id:
          type: string
        slug:
          type: string
        entityType:
          $ref: "#/components/schemas/EntityType"
        name:
          type: string
        displayName:
          type: string
        summary:
          type: string
        environment:
          $ref: "#/components/schemas/Environment"
        cycle:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time
    Fact:
      type: object
      additionalProperties: false
      required: [entityId, key, value, sourceId, confidence, environment, reviewStatus]
      properties:
        entityId:
          type: string
        key:
          type: string
        value: {}
        sourceId:
          type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        environment:
          $ref: "#/components/schemas/Environment"
        cycle:
          type: integer
          minimum: 1
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        importId:
          type: string
        publishedAt:
          type: string
          format: date-time
    Relation:
      type: object
      additionalProperties: false
      required: [subjectEntityId, predicate, objectEntityId, sourceId, confidence, environment]
      properties:
        subjectEntityId:
          type: string
        predicate:
          type: string
        objectEntityId:
          type: string
        sourceId:
          type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        environment:
          $ref: "#/components/schemas/Environment"
    CurrentRelation:
      type: object
      additionalProperties: false
      required: [subjectEntityId, predicate, objectEntityId, sourceId, confidence, environment]
      properties:
        id:
